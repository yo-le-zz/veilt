name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  pypi:
    runs-on: ubuntu-latest

    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: python -m pip install --upgrade build

      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1